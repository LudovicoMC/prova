<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torneo di Basket</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen flex flex-col">

    <header class="bg-orange-600 shadow-md p-4 text-center">
        <h1 class="text-3xl font-extrabold uppercase tracking-wider text-white flex justify-center items-center gap-2">
            <i class="fas fa-basketball-ball text-white animate-bounce"></i> SPIN MOVE 2K26
        </h1>
        <p class="text-orange-100 text-sm mt-1">Gestione gironi, classifiche e risultati</p>
    </header>

    <main class="flex-grow container mx-auto px-4 py-8 max-w-4xl">
        
        <div id="category-selection" class="flex flex-col sm:flex-row gap-4 justify-center items-center my-8">
            <button onclick="selectCategory('maschile')" class="w-full sm:w-64 bg-orange-500 hover:bg-orange-400 text-white font-bold py-6 px-8 rounded-2xl shadow-lg transition-all transform hover:-translate-y-1 text-xl uppercase tracking-wide flex flex-col items-center gap-2">
                <i class="fas fa-mars text-3xl"></i> Maschile
                <span class="text-xs font-normal lowercase opacity-80"></span>
            </button>
            <button onclick="selectCategory('femminile')" class="w-full sm:w-64 bg-pink-600 hover:bg-pink-500 text-white font-bold py-6 px-8 rounded-2xl shadow-lg transition-all transform hover:-translate-y-1 text-xl uppercase tracking-wide flex flex-col items-center gap-2">
                <i class="fas fa-venus text-3xl"></i> Femminile
                <span class="text-xs font-normal lowercase opacity-80">)</span>
            </button>
        </div>

        <div id="tournament-dashboard" class="hidden">
            <button onclick="goBack()" class="mb-6 text-gray-400 hover:text-white flex items-center gap-2 transition-colors">
                <i class="fas fa-arrow-left"></i> Cambia Categoria
            </button>

            <h2 id="dashboard-title" class="text-2xl font-bold border-b border-gray-700 pb-3 mb-6 uppercase tracking-wide text-orange-400"></h2>

            <div id="navigation-buttons" class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-8">
                </div>

            <div id="section-content" class="bg-gray-800 rounded-xl p-6 shadow-xl border border-gray-700 min-h-[300px]">
                </div>
        </div>

    </main>

    <footer class="bg-gray-950 text-center py-4 text-xs text-gray-500 border-t border-gray-800">
        &copy; 2026 Torneo Basket - Gestito con GitHub Pages
    </footer>

    <script>
        let currentCategory = '';
        let currentTab = '';

        // Definizione delle sezioni per categoria
        const sectionsData = {
            maschile: [
                { id: 'calendario', label: 'Calendario Partite', icon: 'fa-calendar-alt' },
                { id: 'risultati', label: 'Turni e Risultati', icon: 'fa-list-ol' },
                { id: 'classifica', label: 'Classifica', icon: 'fa-trophy' },
                { id: 'barilotto', label: 'Torneo Barilotto', icon: 'fa-beer' },
                { id: 'playoff', label: 'Playoff', icon: 'fa-crown' }
            ],
            femminile: [
                { id: 'calendario', label: 'Calendario Partite', icon: 'fa-calendar-alt' },
                { id: 'risultati', label: 'Turni e Risultati', icon: 'fa-list-ol' },
                { id: 'classifica', label: 'Classifica', icon: 'fa-trophy' },
                { id: 'playoff', label: 'Playoff', icon: 'fa-crown' }
            ]
        };

        // Contenuti mockup che potrai modificare direttamente qui sotto
        const contentTemplates = {
            calendario: `<h3 class="text-xl font-bold mb-4 text-orange-400"><i class="fas fa-calendar-alt mr-2"></i>Calendario Partite</h3>
                         <p class="text-gray-400 mb-4">Fase a gironi - Date e orari dei prossimi incontri della categoria.</p>
                         <div class="space-y-3">
                            <div class="bg-gray-700 p-3 rounded-lg flex justify-between items-center">
                                <span>Lunedì 15 Giugno - Ore 18:00</span>
                                <span class="font-semibold text-orange-400">Squadra A vs Squadra B</span>
                            </div>
                            <div class="bg-gray-700 p-3 rounded-lg flex justify-between items-center">
                                <span>Lunedì 15 Giugno - Ore 19:30</span>
                                <span class="font-semibold text-orange-400">Squadra C vs Squadra D</span>
                            </div>
                         </div>`,
            risultati: `<h3 class="text-xl font-bold mb-4 text-orange-400"><i class="fas fa-list-ol mr-2"></i>Turni e Risultati</h3>
                        <p class="text-gray-400 mb-4">I tabellini e i punteggi delle partite giocate.</p>
                        <div class="space-y-2">
                            <div class="bg-gray-700 p-3 rounded-lg flex justify-between">
                                <span>Squadra X - Squadra Y</span>
                                <span class="font-bold text-green-400">78 - 72</span>
                            </div>
                        </div>`,
            classifica: `<h3 class="text-xl font-bold mb-4 text-orange-400"><i class="fas fa-trophy mr-2"></i>Classifica Generale</h3>
                         <div class="overflow-x-auto">
                            <table class="w-full text-left border-collapse">
                                <thead>
                                    <tr class="border-b border-gray-700 text-gray-400">
                                        <th class="py-2">Pos</th>
                                        <th class="py-2">Squadra</th>
                                        <th class="py-2 text-center">V</th>
                                        <th class="py-2 text-center">P</th>
                                        <th class="py-2 text-center">Punti</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr class="border-b border-gray-800">
                                        <td class="py-2 font-bold text-orange-400">1</td>
                                        <td class="py-2">Esempio Team 1</td>
                                        <td class="py-2 text-center">3</td>
                                        <td class="py-2 text-center">0</td>
                                        <td class="py-2 text-center font-bold text-green-400">6</td>
                                    </tr>
                                </tbody>
                            </table>
                         </div>`,
            barilotto: `<h3 class="text-xl font-bold mb-4 text-amber-500"><i class="fas fa-beer mr-2"></i>Torneo Barilotto (Esclusivo Maschile)</h3>
                        <p class="text-gray-400">Sezione speciale dedicata alla classifica del torneo secondario / consolazione o eventi speciali del Barilotto.</p>`,
            playoff: `<h3 class="text-xl font-bold mb-4 text-orange-400"><i class="fas fa-crown mr-2"></i>Tabellone Playoff</h3>
                      <p class="text-gray-400">Fase finale ad eliminazione diretta.</p>
                      <div class="mt-4 p-4 bg-gray-900 border border-dashed border-gray-700 rounded-lg text-center text-gray-500">
                        Il tabellone verrà generato al termine della fase a gironi.
                      </div>`
        };

        function selectCategory(category) {
            currentCategory = category;
            document.getElementById('category-selection').classList.add('hidden');
            document.getElementById('tournament-dashboard').classList.remove('hidden');
            
            // Imposta il titolo principale
            const titleElement = document.getElementById('dashboard-title');
            titleElement.innerText = category === 'maschile' ? 'Torneo Maschile (16 Squadre)' : 'Torneo Femminile';
            titleElement.className = category === 'maschile' ? 'text-2xl font-bold border-b border-gray-700 pb-3 mb-6 uppercase tracking-wide text-orange-400' : 'text-2xl font-bold border-b border-gray-700 pb-3 mb-6 uppercase tracking-wide text-pink-500';

            renderButtons();
            // Mostra la prima sezione di default (Calendario)
            switchTab('calendario');
        }

        function goBack() {
            document.getElementById('category-selection').classList.remove('hidden');
            document.getElementById('tournament-dashboard').classList.add('hidden');
        }

        function renderButtons() {
            const btnContainer = document.getElementById('navigation-buttons');
            btnContainer.innerHTML = ''; // Svuota i vecchi bottoni

            const sections = sectionsData[currentCategory];
            
            // Adatta il layout dei bottoni a seconda di quanti sono
            if(currentCategory === 'femminile') {
                btnContainer.className = "grid grid-cols-2 md:grid-cols-4 gap-3 mb-8";
            } else {
                btnContainer.className = "grid grid-cols-2 md:grid-cols-5 gap-3 mb-8";
            }

            sections.forEach(sec => {
                const button = document.createElement('button');
                button.id = `btn-${sec.id}`;
                button.onclick = () => switchTab(sec.id);
                button.className = `flex flex-col items-center justify-center p-3 rounded-xl font-semibold text-sm transition-all border border-gray-700 bg-gray-800 text-gray-300 hover:bg-gray-700`;
                button.innerHTML = `<i class="fas ${sec.icon} text-lg mb-1"></i> ${sec.label}`;
                btnContainer.appendChild(button);
            });
        }

        function switchTab(tabId) {
            currentTab = tabId;
            const sections = sectionsData[currentCategory];

            // Resetta lo stile di tutti i bottoni della categoria attuale
            sections.forEach(sec => {
                const btn = document.getElementById(`btn-${sec.id}`);
                if (btn) {
                    btn.className = `flex flex-col items-center justify-center p-3 rounded-xl font-semibold text-sm transition-all border border-gray-700 bg-gray-800 text-gray-300 hover:bg-gray-700`;
                }
            });

            // Evidenzia il bottone attivo (Arancione per maschi, Rosa per femmine)
            const activeBtn = document.getElementById(`btn-${tabId}`);
            if (activeBtn) {
                if (currentCategory === 'maschile') {
                    activeBtn.className = `flex flex-col items-center justify-center p-3 rounded-xl font-bold text-sm transition-all border border-orange-500 bg-orange-600 text-white shadow-md shadow-orange-900/30`;
                } else {
                    activeBtn.className = `flex flex-col items-center justify-center p-3 rounded-xl font-bold text-sm transition-all border border-pink-500 bg-pink-600 text-white shadow-md shadow-pink-900/30`;
                }
            }

            // Carica il contenuto corrispondente
            const contentContainer = document.getElementById('section-content');
            contentContainer.innerHTML = contentTemplates[tabId] || `<p class="text-gray-400">Sezione in costruzione...</p>`;
        }
    </script>
</body>
</html>
