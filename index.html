<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torneo Basket Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-orange-600 shadow-md p-4 text-center">
        <h1 class="text-3xl font-extrabold uppercase tracking-wider text-white flex justify-center items-center gap-2">
            <i class="fas fa-basketball-ball text-white"></i> Torneo Basket University
        </h1>
        <p class="text-orange-100 text-sm mt-1">Classifiche e Risultati gestiti su Schede Separate</p>
    </header>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto px-4 py-8 max-w-4xl">
        
        <!-- Selezione Categoria -->
        <div id="category-selection" class="hidden flex flex-col sm:flex-row gap-4 justify-center items-center my-8">
            <button onclick="selectCategory('maschile')" class="w-full sm:w-64 bg-orange-500 hover:bg-orange-400 text-white font-bold py-6 px-8 rounded-2xl shadow-lg transition-all text-xl uppercase tracking-wide flex flex-col items-center gap-2">
                <i class="fas fa-mars text-3xl"></i> Torneo Maschile
            </button>
            <button onclick="selectCategory('femminile')" class="w-full sm:w-64 bg-pink-600 hover:bg-pink-500 text-white font-bold py-6 px-8 rounded-2xl shadow-lg transition-all text-xl uppercase tracking-wide flex flex-col items-center gap-2">
                <i class="fas fa-venus text-3xl"></i> Torneo Femminile
            </button>
        </div>

        <!-- Dashboard Torneo -->
        <div id="tournament-dashboard" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <button onclick="goBack()" class="text-gray-400 hover:text-white flex items-center gap-2 transition-colors">
                    <i class="fas fa-arrow-left"></i> Cambia Categoria
                </button>
                <button onclick="caricaDatiDalFoglio()" class="text-xs bg-gray-800 hover:bg-gray-700 text-gray-300 px-3 py-1.5 rounded-lg border border-gray-700 flex items-center gap-1 transition-colors">
                    <i class="fas fa-sync-alt"></i> Aggiorna Dati
                </button>
            </div>

            <h2 id="dashboard-title" class="text-2xl font-bold border-b border-gray-700 pb-3 mb-6 uppercase tracking-wide"></h2>

            <!-- Bottoni Navigazione -->
            <div id="navigation-buttons" class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-8"></div>

            <!-- Contenuto Dinamico -->
            <div id="section-content" class="bg-gray-800 rounded-xl p-6 shadow-xl border border-gray-700 min-h-[300px]">
                <div class="text-center py-12 text-gray-400"><i class="fas fa-spinner animate-spin text-2xl mb-2"></i> Caricamento dati...</div>
            </div>
        </div>

    </main>

    <footer class="bg-gray-950 text-center py-4 text-xs text-gray-500 border-t border-gray-800">
        &copy; 2026 Torneo Basket - Multi-Scheda Google Fogli Attiva
    </footer>

    <script>
        // Inserisci qui l'ID del tuo foglio Google corrente
        const GOOGLE_SHEET_ID = '1YYP6YIkMWEwkhPOiU5EaYoGdMl86cuz0aaJ5VjqFlEA'; 

        let DATA_PARTITE = [];
        let currentCategory = '';
        let currentTab = 'calendario';

        const sectionsConfig = {
            maschile: [
                { id: 'calendario', label: 'Calendario', icon: 'fa-calendar-alt' },
                { id: 'risultati', label: 'Turni e Risultati', icon: 'fa-list-ol' },
                { id: 'classifica', label: 'Classifiche Gironi', icon: 'fa-trophy' },
                { id: 'barilotto', label: 'Torneo Barilotto', icon: 'fa-beer' },
                { id: 'playoff', label: 'Playoff', icon: 'fa-crown' }
            ],
            femminile: [
                { id: 'calendario', label: 'Calendario', icon: 'fa-calendar-alt' },
                { id: 'risultati', label: 'Turni e Risultati', icon: 'fa-list-ol' },
                { id: 'classifica', label: 'Classifiche Gironi', icon: 'fa-trophy' },
                { id: 'playoff', label: 'Playoff', icon: 'fa-crown' }
            ]
        };

        window.onload = caricaDatiDalFoglio;

        async function caricaDatiDalFoglio() {
            try {
                const contentContainer = document.getElementById('section-content');
                if(contentContainer && currentCategory) {
                    contentContainer.innerHTML = `<div class="text-center py-12 text-gray-400"><i class="fas fa-spinner animate-spin text-2xl mb-2"></i> Aggiornamento dati in corso...</div>`;
                }

                // Generiamo i link per leggere le due schede separate usando il parametro &sheet=
                const urlMaschile = `https://docs.google.com/spreadsheets/d/${GOOGLE_SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Maschile`;
                const urlFemminile = `https://docs.google.com/spreadsheets/d/${GOOGLE_SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Femminile`;

                // Scarichiamo i dati di entrambe le schede contemporaneamente
                const [resM, resF] = await Promise.all([fetch(urlMaschile), fetch(urlFemminile)]);
                const textM = await resM.text();
                const textF = await resF.text();

                // Elaboriamo i dati assegnando la categoria corretta in base alla scheda di provenienza
                const datiMaschile = parseCSV(textM, 'maschile');
                const datiFemminile = parseCSV(textF, 'femminile');

                // Uniamo tutto in un unico grande database locale
                DATA_PARTITE = [...datiMaschile, ...datiFemminile];
                
                const savedCategory = localStorage.getItem('torneo_categoria');
                if (savedCategory) {
                    selectCategory(savedCategory, true);
                } else {
                    document.getElementById('category-selection').classList.remove('hidden');
                    document.getElementById('tournament-dashboard').classList.add('hidden');
                }
            } catch (error) {
                document.getElementById('section-content').innerHTML = `<p class="text-red-400 text-center">Errore nel caricamento. Verifica che il foglio sia pubblico e che le schede si chiamino esattamente "Maschile" e "Femminile".</p>`;
            }
        }

        // Nuovo parser per la struttura a 8 colonne (senza la colonna Categoria)
        function parseCSV(text, categoria) {
            const lines = text.split('\n');
            const data = [];
            for (let i = 1; i < lines.length; i++) {
                let line = lines[i].trim();
                if (!line) continue;
                const cols = line.replace(/"/g, '').split(',');
                if (cols.length >= 8) {
                    data.push({
                        categoria: categoria,
                        girone: cols[0].trim(),
                        turno: cols[1].trim(),
                        data: cols[2].trim(),
                        casa: cols[3].trim(),
                        puntiCasa: parseInt(cols[4]) || 0,
                        puntiFuori: parseInt(cols[5]) || 0,
                        fuori: cols[6].trim(),
                        giocata: cols[7].toUpperCase().trim() === 'SI'
                    });
                }
            }
            return data;
        }

        function selectCategory(category, isRestoring = false) {
            currentCategory = category;
            localStorage.setItem('torneo_categoria', category);
            
            document.getElementById('category-selection').classList.add('hidden');
            document.getElementById('tournament-dashboard').classList.remove('hidden');
            
            const titleElement = document.getElementById('dashboard-title');
            titleElement.innerText = category === 'maschile' ? 'Torneo Maschile' : 'Torneo Femminile';
            titleElement.className = category === 'maschile' ? 'text-2xl font-bold border-b border-gray-700 pb-3 mb-6 text-orange-400' : 'text-2xl font-bold border-b border-gray-700 pb-3 mb-6 text-pink-500';

            renderButtons();
            
            if (isRestoring) {
                const savedTab = localStorage.getItem('torneo_tab') || 'calendario';
                const tabExists = sectionsConfig[category].some(sec => sec.id === savedTab);
                switchTab(tabExists ? savedTab : 'calendario');
            } else {
                switchTab('calendario');
            }
        }

        function goBack() {
            localStorage.removeItem('torneo_categoria');
            localStorage.removeItem('torneo_tab');
            currentCategory = '';
            document.getElementById('category-selection').classList.remove('hidden');
            document.getElementById('tournament-dashboard').classList.add('hidden');
        }

        function renderButtons() {
            const btnContainer = document.getElementById('navigation-buttons');
            const sections = sectionsConfig[currentCategory];
            btnContainer.className = `grid grid-cols-2 md:grid-cols-${sections.length} gap-3 mb-8`;
            btnContainer.innerHTML = '';

            sections.forEach(sec => {
                const button = document.createElement('button');
                button.id = `btn-${sec.id}`;
                button.onclick = () => switchTab(sec.id);
                button.className = `flex flex-col items-center justify-center p-3 rounded-xl font-semibold text-sm bg-gray-800 text-gray-300 border border-gray-700 hover:bg-gray-700`;
                button.innerHTML = `<i class="fas ${sec.icon} text-lg mb-1"></i> ${sec.label}`;
                btnContainer.appendChild(button);
            });
        }

        function switchTab(tabId) {
            currentTab = tabId;
            localStorage.setItem('torneo_tab', tabId);

            sectionsConfig[currentCategory].forEach(sec => {
                const btn = document.getElementById(`btn-${sec.id}`);
                if (btn) btn.className = `flex flex-col items-center justify-center p-3 rounded-xl font-semibold text-sm bg-gray-800 text-gray-300 border border-gray-700 hover:bg-gray-700`;
            });

            const activeBtn = document.getElementById(`btn-${tabId}`);
            if (activeBtn) {
                const colorClass = currentCategory === 'maschile' ? 'border-orange-500 bg-orange-600' : 'border-pink-500 bg-pink-600';
                activeBtn.className = `flex flex-col items-center justify-center p-3 rounded-xl font-bold text-sm border ${colorClass} text-white shadow-lg`;
            }
            renderContent(tabId);
        }

        function renderContent(tabId) {
            const container = document.getElementById('section-content');
            const filtrate = DATA_PARTITE.filter(p => p.categoria === currentCategory);

            if (tabId === 'calendario') {
                const daGiocare = filtrate.filter(p => !p.giocata && !p.turno.toLowerCase().includes('playoff') && !p.turno.toLowerCase().includes('barilotto'));
                stampaListaPartite(container, daGiocare, "Prossime Partite in Calendario", "fa-calendar-alt", "text-orange-400");
                
            } else if (tabId === 'risultati') {
                const giocate = filtrate.filter(p => p.giocata && !p.turno.toLowerCase().includes('playoff') && !p.turno.toLowerCase().includes('barilotto'));
                stampaListaRisultati(container, giocate, "Risultati Incontri", "fa-list-ol", "text-green-400");

            } else if (tabId === 'barilotto') {
                const matchBarilotto = filtrate.filter(p => p.turno.toLowerCase().includes('barilotto'));
                stampaSezioneMista(container, matchBarilotto, "Torneo Barilotto", "fa-beer", "text-amber-500");

            } else if (tabId === 'playoff') {
                const matchPlayoff = filtrate.filter(p => p.turno.toLowerCase().includes('playoff'));
                stampaSezioneMista(container, matchPlayoff, "Fase Playoff", "fa-crown", "text-yellow-500");

            } else if (tabId === 'classifica') {
                calcolaEMostraClassifica(container, filtrate);
            }
        }

        function stampaListaPartite(container, lista, titolo, icona, coloreTesto) {
            if(lista.length === 0) { container.innerHTML = `<p class="text-gray-400 text-center py-8">Nessun match in questa sezione al momento.</p>`; return; }
            let html = `<h3 class="text-xl font-bold mb-4 ${coloreTesto}"><i class="fas ${icona} mr-2"></i>${titolo}</h3><div class="space-y-3">`;
            lista.forEach(p => {
                html += `<div class="bg-gray-700 p-3 sm:p-4 rounded-lg flex flex-col sm:flex-row justify-between items-center gap-2">
                            <span class="text-xs bg-gray-800 px-2 py-1 rounded text-gray-400 font-mono w-full sm:w-auto text-center sm:text-left"><b class="text-orange-400">${p.girone.toUpperCase()}</b> - ${p.turno} - ${p.data}</span>
                            <div class="flex items-center justify-center gap-2 sm:gap-4 text-sm sm:text-lg w-full sm:w-auto">
                                <span class="text-right flex-1 sm:flex-none font-semibold truncate max-w-[120px] sm:max-w-none text-gray-200">${p.casa}</span>
                                <span class="text-orange-500 font-normal text-xs uppercase tracking-wider px-1 flex-shrink-0">vs</span>
                                <span class="text-left flex-1 sm:flex-none font-semibold truncate max-w-[120px] sm:max-w-none text-gray-200">${p.fuori}</span>
                            </div>
                         </div>`;
            });
            container.innerHTML = html + `</div>`;
        }

        function stampaListaRisultati(container, lista, titolo, icona, coloreTesto) {
            if(lista.length === 0) { container.innerHTML = `<p class="text-gray-400 text-center py-8">Nessun risultato disponibile.</p>`; return; }
            let html = `<h3 class="text-xl font-bold mb-4 ${coloreTesto}"><i class="fas ${icona} mr-2"></i>${titolo}</h3><div class="space-y-3">`;
            lista.forEach(p => {
                html += `<div class="bg-gray-700 p-3 sm:p-4 rounded-lg flex flex-col sm:flex-row justify-between items-center gap-2">
                            <span class="text-xs bg-gray-800 px-2 py-1 rounded text-gray-400 font-mono w-full sm:w-auto text-center sm:text-left"><b class="text-green-400">${p.girone.toUpperCase()}</b> - ${p.turno}</span>
                            <div class="flex items-center justify-center gap-2 sm:gap-4 text-sm sm:text-lg w-full sm:w-auto">
                                <span class="text-right flex-1 sm:flex-none truncate max-w-[120px] sm:max-w-none ${p.puntiCasa > p.puntiFuori ? 'font-bold text-white': 'text-gray-400'}">${p.casa}</span>
                                <span class="bg-gray-900 px-2.5 py-1 rounded font-mono font-bold text-yellow-400 text-xs sm:text-base whitespace-nowrap flex-shrink-0 shadow-inner">${p.puntiCasa} - ${p.puntiFuori}</span>
                                <span class="text-left flex-1 sm:flex-none truncate max-w-[120px] sm:max-w-none ${p.puntiFuori > p.puntiCasa ? 'font-bold text-white': 'text-gray-400'}">${p.fuori}</span>
                            </div>
                         </div>`;
            });
            container.innerHTML = html + `</div>`;
        }

        function stampaSezioneMista(container, lista, titolo, icona, coloreTesto) {
            if(lista.length === 0) { container.innerHTML = `<h3 class="text-xl font-bold mb-4 ${coloreTesto}"><i class="fas ${icona} mr-2"></i>${titolo}</h3><p class="text-gray-400 text-center py-8">In attesa della generazione degli accoppiamenti...</p>`; return; }
            let html = `<h3 class="text-xl font-bold mb-4 ${coloreTesto}"><i class="fas ${icona} mr-2"></i>${titolo}</h3><div class="space-y-3">`;
            lista.forEach(p => {
                const punteggio = p.giocata 
                    ? `<span class="bg-gray-900 px-2.5 py-1 rounded font-mono font-bold text-yellow-400 text-xs sm:text-base whitespace-nowrap flex-shrink-0 shadow-inner">${p.puntiCasa} - ${p.puntiFuori}</span>` 
                    : `<span class="text-xs bg-gray-800 px-2 py-1 rounded text-gray-400 font-mono whitespace-nowrap flex-shrink-0">${p.data}</span>`;
                
                html += `<div class="bg-gray-700 p-3 sm:p-4 rounded-lg flex flex-col sm:flex-row justify-between items-center gap-2">
                            <span class="text-xs bg-gray-800 px-2 py-1 rounded text-gray-400 font-mono w-full sm:w-auto text-center sm:text-left">${p.turno}</span>
                            <div class="flex items-center justify-center gap-2 sm:gap-4 text-sm sm:text-lg w-full sm:w-auto">
                                <span class="text-right flex-1 sm:flex-none truncate max-w-[120px] sm:max-w-none ${p.giocata && p.puntiCasa > p.puntiFuori ? 'font-bold text-white': 'text-gray-400'}">${p.casa}</span>
                                ${punteggio}
                                <span class="text-left flex-1 sm:flex-none truncate max-w-[120px] sm:max-w-none ${p.giocata && p.puntiFuori > p.puntiCasa ? 'font-bold text-white': 'text-gray-400'}">${p.fuori}</span>
                            </div>
                         </div>`;
            });
            container.innerHTML = html + `</div>`;
        }

        function calcolaEMostraClassifica(container, tutteLePartite) {
            let gironi = {};
            
            tutteLePartite.forEach(p => {
                if (!p.turno.toLowerCase().includes('playoff') && !p.turno.toLowerCase().includes('barilotto')) {
                    const gNome = p.girone.toUpperCase() || 'GENERALE';
                    if (!gironi[gNome]) gironi[gNome] = {};
                    if (!gironi[gNome][p.casa]) gironi[gNome][p.casa] = { nome: p.casa, vinte: 0, perse: 0, punti: 0, fatti: 0, subiti: 0 };
                    if (!gironi[gNome][p.fuori]) gironi[gNome][p.fuori] = { nome: p.fuori, vinte: 0, perse: 0, punti: 0, fatti: 0, subiti: 0 };
                }
            });

            tutteLePartite.forEach(p => {
                if (p.giocata && !p.turno.toLowerCase().includes('playoff') && !p.turno.toLowerCase().includes('barilotto')) {
                    const gNome = p.girone.toUpperCase() || 'GENERALE';
                    if(gironi[gNome] && gironi[gNome][p.casa] && gironi[gNome][p.fuori]) {
                        gironi[gNome][p.casa].fatti += p.puntiCasa;
                        gironi[gNome][p.casa].subiti += p.puntiFuori;
                        gironi[gNome][p.fuori].fatti += p.puntiFuori;
                        gironi[gNome][p.fuori].subiti += p.puntiCasa;

                        if (p.puntiCasa > p.puntiFuori) {
                            gironi[gNome][p.casa].vinte += 1;
                            gironi[gNome][p.casa].punti += 2;
                            gironi[gNome][p.fuori].perse += 1;
                        } else {
                            gironi[gNome][p.fuori].vinte += 1;
                            gironi[gNome][p.fuori].punti += 2;
                            gironi[gNome][p.casa].perse += 1;
                        }
                    }
                }
            });

            let html = `<h3 class="text-xl font-bold mb-6 text-yellow-500"><i class="fas fa-trophy mr-2"></i>Classifiche dei Gironi</h3>`;
            const gironiOrdinati = Object.keys(gironi).sort();
            
            if (gironiOrdinati.length === 0) { 
                container.innerHTML = `<p class="text-gray-400 text-center py-8">Inserisci le partite nel foglio per generare le classifiche.</p>`; 
                return; 
            }

            gironiOrdinati.forEach(gNome => {
                let ordinata = Object.values(gironi[gNome]).sort((a, b) => {
                    if (b.punti !== a.punti;
                    return (b.fatti - b.subiti) - (a.fatti - a.subiti);
                });

                const colorGirone = currentCategory === 'maschile' ? 'text-orange-400' : 'text-pink-500';

                html += `<div class="mb-8 bg-gray-850 p-4 rounded-xl border border-gray-700 shadow-lg">
                            <h4 class="text-lg font-bold mb-3 ${colorGirone} border-b border-gray-700 pb-1 uppercase tracking-wider">${gNome}</h4>
                            <div class="overflow-x-auto"><table class="w-full text-left border-collapse">
                            <thead><tr class="border-b border-gray-800 text-gray-400 text-xs uppercase">
                                <th class="py-2 px-2 w-12">Pos</th><th class="py-2">Squadra</th>
                                <th class="py-2 text-center w-16">Punti</th><th class="py-2 text-center w-12">V</th><th class="py-2 text-center w-12">P</th>
                                <th class="py-2 text-center w-16 hidden sm:table-cell">Diff</th>
                            </tr></thead><tbody>`;
                
                ordinata.forEach((sq, index) => {
                    const diff = sq.fatti - sq.subiti;
                    html += `<tr class="border-b border-gray-800 hover:bg-gray-750 transition-colors">
                                <td class="py-2.5 px-2 font-bold text-gray-500">${index + 1}</td>
                                <td class="py-2.5 font-semibold text-sm sm:text-base text-gray-200">${sq.nome}</td>
                                <td class="py-2.5 text-center font-bold text-green-400 text-sm sm:text-base">${sq.punti}</td>
                                <td class="py-2.5 text-center text-sm">${sq.vinte}</td>
                                <td class="py-2.5 text-center text-sm">${sq.perse}</td>
                                <td class="py-2.5 text-center text-xs text-gray-400 hidden sm:table-cell font-mono">${diff > 0 ? '+' + diff : diff}</td>
                             </tr>`;
                });
                html += `</tbody></table></div></div>`;
            });

            container.innerHTML = html;
        }
    </script>
</body>
</html>
